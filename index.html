
<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>من سيربح الأثير؟</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background-color: #000;
      color: #fff;
      margin: 0;
      padding: 0;
      display: flex;
    }
    .sidebar {
      width: 160px;
      background: #111;
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }
    .prizes {
      list-style: none;
      padding: 0;
      font-size: 14px;
    }
    .prizes li {
      padding: 6px;
      margin: 3px 0;
      background-color: #222;
      border-radius: 5px;
      text-align: center;
      color: #ffd700;
    }
    .current-prize {
      background-color: #ffd700 !important;
      color: #000 !important;
      font-weight: bold;
    }
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
    }
    .question-box {
      margin-top: 30px;
      text-align: center;
    }
    .question-box h2 {
      font-size: 26px;
      margin-bottom: 20px;
    }
    .options {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin: 20px 0;
    }
    .option {
      background-color: #222;
      color: #fff;
      border: 2px solid #00bfff;
      border-radius: 25px;
      padding: 15px 40px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }
    .option:hover {
      background-color: #00bfff;
      color: #000;
    }
    .helpers {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
    }
    .helper-btn {
      background-color: #222;
      border: 2px solid #444;
      border-radius: 10px;
      color: #fff;
      padding: 10px 20px;
      cursor: pointer;
    }
    .helper-btn:hover {
      background-color: #444;
    }
    .emoji-box {
      font-size: 80px;
      margin: 20px;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <ul class="prizes" id="prizeList">
      <li>1,000,000</li>
      <li>500,000</li>
      <li>250,000</li>
      <li>125,000</li>
      <li>64,000</li>
      <li>32,000</li>
      <li>16,000</li>
      <li>8,000</li>
      <li>4,000</li>
      <li>2,000</li>
      <li>1,000</li>
      <li>500</li>
      <li>300</li>
      <li>200</li>
      <li>100</li>
    </ul>
  </div>

  <div class="container">
    <div class="helpers">
      <button class="helper-btn">50 : 50</button>
      <button class="helper-btn">📞</button>
      <button class="helper-btn">👥</button>
    </div>
    <div class="emoji-box">
      🤔
    </div>
    <div class="question-box">
      <h2>من هو مكتشف الجاذبية الأرضية؟</h2>
      <div class="options">
        <div class="option">أ - نيوتن</div>
        <div class="option">ب - أفلاطون</div>
        <div class="option">ج - أديسون</div>
        <div class="option">د - الحسن بن الهيثم</div>
      </div>
    </div>
  </div>
</body>
</html>
