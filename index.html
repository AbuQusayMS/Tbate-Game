<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>من سيربح اللقب؟ - النسخة المحسنة</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* جميع أنماط CSS السابقة تبقى كما هي */
    /* تم إضافة أنماط جديدة لحالة الحفظ */
    .save-status {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 10px 15px;
      border-radius: 30px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 10000;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      transition: opacity 0.3s ease;
    }
    
    .save-status.saving {
      background: rgba(26, 58, 108, 0.9);
    }
    
    .save-status.saved {
      background: rgba(76, 175, 80, 0.9);
    }
    
    .save-status.error {
      background: rgba(244, 67, 54, 0.9);
    }
    
    .option.disabled {
      text-decoration: line-through;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="crown-icon">👑</div>
  
  <!-- شاشة البداية -->
  <div id="startScreen">
    <!-- محتوى شاشة البداية يبقى كما هو -->
  </div>

  <!-- إدخال الاسم -->
  <div id="nameEntry">
    <!-- محتوى إدخال الاسم يبقى كما هو -->
  </div>
  
  <!-- الشريط الجانبي للجوائز -->
  <div class="sidebar">
    <!-- محتوى الشريط الجانبي يبقى كما هو -->
  </div>

  <!-- المحتوى الرئيسي -->
  <div class="container">
    <!-- محتوى المحتوى الرئيسي يبقى كما هو -->
  </div>
  
  <!-- شاشة النهاية -->
  <div id="endScreen">
    <!-- محتوى شاشة النهاية يبقى كما هو -->
  </div>
  
  <!-- نافذة مشاركة النتائج -->
  <div id="shareModal">
    <!-- محتوى نافذة المشاركة يبقى كما هو -->
  </div>
  
  <!-- حالة الحفظ -->
  <div id="saveStatus" class="save-status">
    <i class="fas fa-save"></i>
    <span id="saveStatusText">تم الحفظ ✓</span>
  </div>

  <script>
    // رابط تطبيق الويب
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbye_Br8h7RVNBnI84fRxYA2RsNktq8gqSAQeh2txYdkqgAZYc1G-W1CvpTS67XR0nd5/exec';

    // قائمة الأسئلة والجوائز والأسماء المسموحة تبقى كما هي
    
    // متغيرات اللعبة مع إضافة متغيرات جديدة
    let currentQuestion = 0;
    let playerName = "";
    let timer;
    let timeLeft = 30;
    let score = 0;
    let wrongAnswers = 0;
    const maxWrongAnswers = 3;
    let shuffledQuestions = [];
    let playerStats = {
      attempts: 0,
      bestScore: 0,
      bestTitle: "",
      lastScore: 0,
      lastTitle: ""
    };
    let currentAttemptNumber = 0;
    let timeHelpUsed = false;
    let changeQuestionUsed = false;
    let fiftyFiftyUsed = false;
    let usedPoints = 0;
    let gameStartTime;
    let gameEndTime;
    let participantId = '';
    let gameEvents = [];
    let debounceTimer;
    let saveQueue = [];
    let isOnline = navigator.onLine;
    
    // عناصر DOM مع إضافة عناصر جديدة
    const saveStatus = document.getElementById("saveStatus");
    const saveStatusText = document.getElementById("saveStatusText");

    // دالة لتحديث حالة الحفظ
    function updateSaveStatus(message, type = 'saved') {
      saveStatus.className = `save-status ${type}`;
      saveStatusText.textContent = message;
      saveStatus.style.display = 'flex';
      
      if (type === 'saved') {
        setTimeout(() => {
          saveStatus.style.display = 'none';
        }, 2000);
      }
    }

    // دالة لحفظ الحالة المحلية
    function saveLocalState() {
      const gameState = {
        participantId,
        playerName,
        currentAttempt: currentAttemptNumber,
        currentQuestion,
        score,
        wrongAnswers,
        usedPoints,
        fiftyFiftyUsed,
        timeHelpUsed,
        changeQuestionUsed,
        startTime: gameStartTime?.toISOString(),
        gameEvents,
        shuffledQuestions,
        playerStats
      };
      
      localStorage.setItem('gameState', JSON.stringify(gameState));
      updateSaveStatus('تم الحفظ محليًا ✓', 'saved');
    }

    // دالة لتحميل الحالة المحلية
    function loadLocalState() {
      const savedState = localStorage.getItem('gameState');
      if (savedState) {
        const state = JSON.parse(savedState);
        
        participantId = state.participantId || '';
        playerName = state.playerName || '';
        currentAttemptNumber = state.currentAttempt || 0;
        currentQuestion = state.currentQuestion || 0;
        score = state.score || 0;
        wrongAnswers = state.wrongAnswers || 0;
        usedPoints = state.usedPoints || 0;
        fiftyFiftyUsed = state.fiftyFiftyUsed || false;
        timeHelpUsed = state.timeHelpUsed || false;
        changeQuestionUsed = state.changeQuestionUsed || false;
        gameEvents = state.gameEvents || [];
        shuffledQuestions = state.shuffledQuestions || [];
        playerStats = state.playerStats || {
          attempts: 0,
          bestScore: 0,
          bestTitle: "",
          lastScore: 0,
          lastTitle: ""
        };
        
        if (state.startTime) {
          gameStartTime = new Date(state.startTime);
        }
        
        // تحديث واجهة المستخدم
        scoreElement.textContent = formatNumber(score);
        wrongCountElement.textContent = wrongAnswers;
        updateTitle();
        
        if (playerName) {
          playerDisplayName.textContent = playerName;
          playerAvatar.textContent = playerName.charAt(0).toUpperCase();
        }
        
        // تحديث حالة أزرار المساعدة
        fiftyBtn.disabled = fiftyFiftyUsed;
        addTimeBtn.disabled = timeHelpUsed;
        changeQuestionBtn.disabled = changeQuestionUsed;
        
        return true;
      }
      return false;
    }

    // دالة لإرسال البيانات إلى جدول جوجل
    async function sendToGoogleSheets(data, isFinal = false) {
      if (!isOnline) {
        saveQueue.push({data, isFinal});
        updateSaveStatus('لا يوجد اتصال، سيتم الحفظ لاحقاً', 'error');
        return false;
      }
      
      try {
        updateSaveStatus('جارٍ الحفظ على السحابة...', 'saving');
        
        const payload = {
          participantId,
          name: playerName,
          attempt: currentAttemptNumber,
          currentQuestion,
          score,
          status: isFinal ? 'انتهى' : 'مستمر',
          lastUpdate: new Date().toISOString(),
          startTime: gameStartTime.toISOString(),
          endTime: isFinal ? new Date().toISOString() : null,
          totalTime: isFinal ? calculateTotalTime() : '',
          wrongAnswers,
          usedPoints,
          helpersUsed: JSON.stringify({
            fiftyFiftyUsed,
            timeHelpUsed,
            changeQuestionUsed
          }),
          events: JSON.stringify(gameEvents),
          finalTitle: isFinal ? getCurrentTitle() : ''
        };
        
        const response = await fetch(WEB_APP_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });
        
        const result = await response.json();
        if (result.success) {
          updateSaveStatus('تم الحفظ على السحابة ✓', 'saved');
          return true;
        } else {
          throw new Error(result.error || 'فشل الحفظ على السحابة');
        }
      } catch (error) {
        console.error('Error saving to Google Sheets:', error);
        saveQueue.push({data, isFinal});
        updateSaveStatus('فشل الحفظ، سيتم إعادة المحاولة لاحقاً', 'error');
        return false;
      }
    }

    // دالة لحساب الوقت الإجمالي
    function calculateTotalTime() {
      if (!gameStartTime || !gameEndTime) return '00:00';
      
      const diff = gameEndTime - gameStartTime;
      const minutes = Math.floor(diff / 60000);
      const seconds = Math.floor((diff % 60000) / 1000);
      return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    // دالة لإدارة قائمة الانتظار
    async function processSaveQueue() {
      if (saveQueue.length === 0 || !isOnline) return;
      
      updateSaveStatus('جارٍ معالجة الطابور...', 'saving');
      
      while (saveQueue.length > 0 && isOnline) {
        const item = saveQueue[0];
        const success = await sendToGoogleSheets(item.data, item.isFinal);
        
        if (success) {
          saveQueue.shift();
        } else {
          break;
        }
      }
      
      if (saveQueue.length === 0) {
        updateSaveStatus('تمت معالجة الطابور بالكامل ✓', 'saved');
      }
    }

    // دالة لتسجيل الأحداث
    function logEvent(eventType, details = {}) {
      const event = {
        timestamp: new Date().toISOString(),
        type: eventType,
        details
      };
      
      gameEvents.push(event);
      debouncedSave();
    }

    // دالة للتأخير في الحفظ لتجميع الطلبات
    function debouncedSave() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        saveLocalState();
        sendToGoogleSheets({ currentQuestion, score }, false);
      }, 500);
    }

    // تهيئة اللعبة مع تحسينات
    function initGame() {
      // خلط الأسئلة عشوائياً
      shuffleQuestions();
      
      totalQuestions.textContent = questions.length;
      renderPrizes();
      showQuestion();
      startTimer();
      updatePlayerStats();
      
      // تسجيل وقت بدء اللعبة
      gameStartTime = new Date();
      
      // إنشاء معرّف فريد إذا لم يكن موجوداً
      if (!participantId) {
        participantId = 'player-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
      }
      
      // تسجيل حدث البدء
      logEvent('game_start', {
        attempt: currentAttemptNumber,
        playerName
      });
    }

    // التحقق من الإجابة مع إضافة تسجيل الحدث
    function checkAnswer(index) {
      const q = shuffledQuestions[currentQuestion];
      const correct = q.correct;
      const options = document.querySelectorAll(".option");

      // إيقاف المؤقت
      clearInterval(timer);
      
      // تعطيل جميع الخيارات
      options.forEach(opt => {
        opt.style.pointerEvents = "none";
      });

      // تمييز الإجابة الصحيحة والخاطئة
      options.forEach((opt, i) => {
        if (i === correct) {
          setTimeout(() => {
            opt.classList.add("correct");
          }, 500);
        }
        if (i === index && i !== correct) {
          setTimeout(() => {
            opt.classList.add("wrong");
          }, 500);
          wrongAnswers++;
          updateWrongCount();
        }
      });

      // تسجيل الحدث
      logEvent('answer', {
        question: currentQuestion,
        selected: index,
        correct: index === correct,
        timeLeft: timeLeft
      });

      // التحقق من صحة الإجابة
      if (index === correct) {
        // إضافة نقاط الجائزة الحالية إلى النقاط الإجمالية
        score += prizes[currentQuestion].points;
        scoreElement.textContent = formatNumber(score);
        updateTitle();
        
        setTimeout(() => {
          // حفظ التقدم
          debouncedSave();
          
          // الانتقال للسؤال التالي
          currentQuestion++;
          
          if (currentQuestion < shuffledQuestions.length && wrongAnswers < maxWrongAnswers) {
            showQuestion();
          } else {
            endGame(wrongAnswers < maxWrongAnswers);
          }
        }, 1500);
      } else {
        setTimeout(() => {
          // حفظ التقدم
          debouncedSave();
          
          if (wrongAnswers >= maxWrongAnswers) {
            endGame(false);
          } else {
            // الانتقال للسؤال التالي حتى مع الإجابة الخاطئة
            currentQuestion++;
            
            if (currentQuestion < shuffledQuestions.length) {
              showQuestion();
            } else {
              endGame(true);
            }
          }
        }, 1500);
      }
    }

    // المساعدة: حذف إجابتين (50:50)
    fiftyBtn.onclick = () => {
      if (fiftyFiftyUsed) {
        alert("لقد استخدمت هذه المساعدة بالفعل!");
        return;
      }
      
      if (score < 40000) {
        alert("تحتاج إلى 40000 نقطة على الأقل لاستخدام هذه الميزة!");
        return;
      }
      
      score -= 40000;
      usedPoints += 40000;
      fiftyFiftyUsed = true;
      scoreElement.textContent = formatNumber(score);
      fiftyBtn.disabled = true;
      
      // تسجيل الحدث
      logEvent('helper_used', {
        type: '50:50',
        cost: 40000
      });
      
      debouncedSave();

      const q = shuffledQuestions[currentQuestion];
      const wrongIndexes = q.options.map((_, i) => i).filter(i => i !== q.correct);

      // اختيار إجابتين خاطئتين بشكل عشوائي
      const shuffled = [...wrongIndexes].sort(() => Math.random() - 0.5);
      const toRemove = shuffled.slice(0, 2);

      const options = document.querySelectorAll(".option");
      toRemove.forEach(i => {
        options[i].classList.add('disabled');
        options[i].style.pointerEvents = "none";
      });
    };

    // انتهاء اللعبة مع إرسال النتائج النهائية
    async function endGame(isWin) {
      clearInterval(timer);
      gameEndTime = new Date();
      
      // تسجيل الحدث النهائي
      logEvent('game_end', {
        win: isWin,
        score: score,
        wrongAnswers: wrongAnswers,
        finalTitle: getCurrentTitle()
      });
      
      // حفظ التقدم النهائي
      saveLocalState();
      await sendToGoogleSheets({}, true);
      
      // حساب صافي النقاط
      const netScore = score - usedPoints;
      
      // حساب مدة اللعبة
      const timeDiff = gameEndTime - gameStartTime;
      const minutes = Math.floor(timeDiff / 60000);
      const seconds = Math.floor((timeDiff % 60000) / 1000);
      const formattedTime = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      
      // حساب عدد المساعدات المستخدمة
      const usedHelpersCount = [fiftyFiftyUsed, timeHelpUsed, changeQuestionUsed].filter(Boolean).length;
      
      // حفظ إحصائيات اللاعب
      savePlayerStats();
      
      if (isWin) {
        endTitle.textContent = "مبروك! لقد فزت باللقب";
      } else {
        endTitle.textContent = "انتهت اللعبة";
      }
      
      const currentTitle = getCurrentTitle();
      prizeEarned.textContent = currentTitle;
      finalScore.textContent = formatNumber(score);
      finalTitleElement.textContent = playerStats.bestTitle;
      
      // تحديث قيم النتائج في التصميم الجديد
      document.getElementById("playerNameEnd").textContent = playerName;
      document.getElementById("totalPointsEnd").textContent = formatNumber(score);
      document.getElementById("netPointsEnd").textContent = formatNumber(netScore);
      document.getElementById("highestTitle").textContent = playerStats.bestTitle;
      document.getElementById("endTime").textContent = formattedTime;
      document.getElementById("usedHelpersCount").textContent = usedHelpersCount;
      document.getElementById("usedPointsEnd").textContent = formatNumber(usedPoints);
      
      document.getElementById("endScreen").style.display = "flex";
    }

    // تسجيل الاسم مع إنشاء معرّف فريد
    function submitName() {
      const nameInput = document.getElementById("playerName");
      const name = nameInput.value.trim();
      
      if (!name) {
        alert("الرجاء إدخال اسمك للمشاركة");
        return;
      }
      
      // التحقق من وجود الاسم في القائمة المسموحة
      const found = allowedNames.some(entry => entry.name === name);
      
      if (found) {
        playerName = name;
        playerDisplayName.textContent = name;
        playerAvatar.textContent = name.charAt(0).toUpperCase();
        
        document.getElementById("nameEntry").style.display = "none";
        document.querySelector(".sidebar").style.display = "flex";
        document.querySelector(".container").style.display = "flex";
        
        // إنشاء معرّف فريد
        participantId = 'player-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
        
        initGame();
      } else {
        alert("اسمك غير موجود ضمن القائمة المسموح لها بالمشاركة. تأكد من كتابة الاسم بشكل صحيح أو تواصل مع مسؤول المسابقة لإضافته.");
      }
    }

    // تهيئة الصفحة مع تحميل الحالة المحفوظة
    window.onload = () => {
      document.querySelector(".sidebar").style.display = "none";
      document.querySelector(".container").style.display = "none";
      document.getElementById("nameEntry").style.display = "none";
      document.getElementById("endScreen").style.display = "none";
      document.getElementById("shareModal").style.display = "none";
      document.getElementById("maxWrong").textContent = maxWrongAnswers;
      
      // تحميل الحالة المحفوظة إن وجدت
      if (loadLocalState()) {
        if (playerName) {
          document.getElementById("nameEntry").style.display = "none";
          document.querySelector(".sidebar").style.display = "flex";
          document.querySelector(".container").style.display = "flex";
          showQuestion();
        }
      }
      
      // مراقبة حالة الاتصال
      window.addEventListener('online', () => {
        isOnline = true;
        updateSaveStatus('الاتصال متوفر مرة أخرى', 'saved');
        processSaveQueue();
      });
      
      window.addEventListener('offline', () => {
        isOnline = false;
        updateSaveStatus('فقدت الاتصال بالإنترنت', 'error');
      });
      
      // مراقبة إغلاق الصفحة
      window.addEventListener('beforeunload', (e) => {
        // تسجيل حدث الخروج
        logEvent('page_close');
        
        // حفظ سريع قبل الخروج
        saveLocalState();
        sendToGoogleSheets({}, false);
      });
    };
    
    // بقية الدوال تبقى كما هي مع إضافة استدعاءات logEvent و debouncedSave عند النقاط الحرجة
    // ...
  </script>
</body>
</html>
